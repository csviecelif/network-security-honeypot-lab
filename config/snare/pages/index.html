<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CorpNet – Portal Interno</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a2332;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      border-radius: 6px;
      padding: 40px 36px;
      width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 { color: #1a2332; font-size: 1.6rem; letter-spacing: 1px; }
    .logo span { color: #e74c3c; }
    .logo p { color: #888; font-size: 0.82rem; margin-top: 4px; }
    label { display: block; font-size: 0.82rem; color: #555; margin-bottom: 4px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 10px 12px;
      border: 1px solid #ccc; border-radius: 4px;
      font-size: 0.95rem; margin-bottom: 18px;
    }
    input:focus { outline: none; border-color: #1a2332; }
    button {
      width: 100%; padding: 11px;
      background: #1a2332; color: #fff;
      border: none; border-radius: 4px;
      font-size: 1rem; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #243045; }
    .footer { text-align: center; margin-top: 18px; font-size: 0.75rem; color: #aaa; }
    .alert { background: #fff3cd; border: 1px solid #ffc107; color: #856404;
             border-radius: 4px; padding: 8px 12px; margin-bottom: 16px; font-size: 0.82rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1>Corp<span>Net</span></h1>
      <p>Sistema de Gestão Corporativo — Uso Restrito</p>
    </div>
    <div class="alert">⚠ Acesso monitorado. Apenas colaboradores autorizados.</div>
    <form method="POST" action="/login">
      <label>Usuário (matrícula ou e-mail)</label>
      <input type="text" name="username" placeholder="ex: joao.silva ou 12345" />
      <label>Senha</label>
      <input type="password" name="password" placeholder="••••••••" />
      <button type="submit">Entrar</button>
    </form>
    <div class="footer">CorpNet v3.2 &nbsp;|&nbsp; TI Corporativo &nbsp;|&nbsp; © 2024</div>
  </div>
</body>
</html>
